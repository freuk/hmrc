bind  status P !<git push
bind  status F !<git push -f
bind  main P !<git push
bind  main F !<git push -f

bind main C !<git commit

bind  status P !git push
bind  status D @trash %(file)
bind  status I @git checkout %(file)

bind main <Ctrl-R> !<git rebase -i %(commit)^
bind diff <Ctrl-R> !<git rebase -i %(commit)^

bind status r !git  rebase --continue
